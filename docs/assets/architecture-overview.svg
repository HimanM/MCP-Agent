<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F1"/>
      <stop offset="1" stop-color="#F7E7D8"/>
    </linearGradient>
    <linearGradient id="panel" x1="220" y1="140" x2="1180" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDFB"/>
      <stop offset="1" stop-color="#FFF5EA"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#A96540" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1400" height="860" rx="40" fill="url(#bg)"/>
  <rect x="52" y="52" width="1296" height="756" rx="36" fill="url(#panel)" stroke="#E8CCB8" filter="url(#shadow)"/>

  <text x="110" y="124" fill="#2B2118" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="500">Kapruka AI Architecture</text>
  <text x="110" y="160" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="22">Competition build: one chat surface, one API layer, one shared session context.</text>

  <rect x="108" y="220" width="282" height="162" rx="28" fill="#FFFFFF" stroke="#E4C7B2"/>
  <text x="138" y="268" fill="#B9683D" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">USER SURFACE</text>
  <text x="138" y="314" fill="#2B2118" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">Next.js frontend</text>
  <text x="138" y="350" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Chat UI, cart, gift advisor,</text>
  <text x="138" y="378" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">categories, offers, tracking.</text>

  <rect x="468" y="220" width="466" height="162" rx="28" fill="#FFF9F4" stroke="#D9B49A" stroke-width="2"/>
  <text x="498" y="268" fill="#B9683D" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">ORCHESTRATION</text>
  <text x="498" y="314" fill="#2B2118" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">FastAPI backend</text>
  <text x="498" y="350" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Prompt assembly, provider routing,</text>
  <text x="498" y="378" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">tool execution, rate limits, SSE chat.</text>

  <rect x="1012" y="220" width="274" height="162" rx="28" fill="#FFFFFF" stroke="#E4C7B2"/>
  <text x="1042" y="268" fill="#B9683D" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">MODEL LAYER</text>
  <text x="1042" y="314" fill="#2B2118" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">OpenRouter</text>
  <text x="1042" y="350" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Gemma 4 31B as the</text>
  <text x="1042" y="378" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">main shopping assistant.</text>

  <rect x="108" y="476" width="282" height="174" rx="28" fill="#FFFFFF" stroke="#E4C7B2"/>
  <text x="138" y="524" fill="#B9683D" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">VOICE I/O</text>
  <text x="138" y="570" fill="#2B2118" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">Mic + speech</text>
  <text x="138" y="606" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Browser recording, STT route,</text>
  <text x="138" y="634" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">TTS playback for replies.</text>

  <rect x="468" y="476" width="222" height="174" rx="28" fill="#FFFFFF" stroke="#E4C7B2"/>
  <text x="498" y="524" fill="#B9683D" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">STATE</text>
  <text x="498" y="570" fill="#2B2118" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">Redis</text>
  <text x="498" y="606" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Session context,</text>
  <text x="498" y="634" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">cart, usage data.</text>

  <rect x="712" y="476" width="222" height="174" rx="28" fill="#FFFFFF" stroke="#E4C7B2"/>
  <text x="742" y="524" fill="#B9683D" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">TOOLS</text>
  <text x="742" y="570" fill="#2B2118" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">Kapruka MCP</text>
  <text x="742" y="606" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Catalog, categories,</text>
  <text x="742" y="634" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">deals, order tracking.</text>

  <rect x="956" y="476" width="330" height="174" rx="28" fill="#FFFFFF" stroke="#E4C7B2"/>
  <text x="986" y="524" fill="#B9683D" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">VOICE SERVICES</text>
  <text x="986" y="570" fill="#2B2118" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">STT + ElevenLabs</text>
  <text x="986" y="606" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Speech-to-text in, natural</text>
  <text x="986" y="634" fill="#6A584A" font-family="'Segoe UI', Arial, sans-serif" font-size="21">spoken reply out.</text>

  <path d="M390 301H468" stroke="#C8693A" stroke-width="5" stroke-linecap="round"/>
  <path d="M934 301H1012" stroke="#C8693A" stroke-width="5" stroke-linecap="round"/>
  <path d="M248 382V476" stroke="#C8693A" stroke-width="5" stroke-linecap="round"/>
  <path d="M580 382V476" stroke="#C8693A" stroke-width="5" stroke-linecap="round"/>
  <path d="M823 382V476" stroke="#C8693A" stroke-width="5" stroke-linecap="round"/>
  <path d="M1121 382V476" stroke="#C8693A" stroke-width="5" stroke-linecap="round"/>

  <circle cx="390" cy="301" r="8" fill="#C8693A"/>
  <circle cx="934" cy="301" r="8" fill="#C8693A"/>
  <circle cx="248" cy="476" r="8" fill="#C8693A"/>
  <circle cx="580" cy="476" r="8" fill="#C8693A"/>
  <circle cx="823" cy="476" r="8" fill="#C8693A"/>
  <circle cx="1121" cy="476" r="8" fill="#C8693A"/>

  <text x="110" y="740" fill="#8B715D" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Production would need stronger auth, observability, evals, abuse controls, durable persistence, and full voice QA.</text>
</svg>
